name: Update WCA Data

on:
  schedule:
    # Every Monday at 06:00 UTC (WCA exports are updated on Mondays)
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Import WCA data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:import
